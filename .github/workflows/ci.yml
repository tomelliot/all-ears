name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Lint formatting
        run: swift format lint --recursive --strict Sources/ Tests/

      - name: Build
        run: swift build

      - name: Test
        run: swift test
